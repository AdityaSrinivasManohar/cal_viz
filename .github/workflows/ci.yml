name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -qO /etc/apt/trusted.gpg.d/apt.llvm.org.asc https://apt.llvm.org/llvm-snapshot.gpg.key
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-22

      - name: Install CMake 4.3.3
        run: |
          curl -fsSL https://github.com/Kitware/CMake/releases/download/v4.3.3/cmake-4.3.3-linux-x86_64.sh \
            -o /tmp/cmake.sh
          sudo sh /tmp/cmake.sh --prefix=/usr/local --skip-license

      - name: Configure
        run: cmake -B build -DCMAKE_CXX_COMPILER=clang++-22

      - name: Build
        run: cmake --build build --parallel

  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-22
        run: |
          wget -qO /etc/apt/trusted.gpg.d/apt.llvm.org.asc https://apt.llvm.org/llvm-snapshot.gpg.key
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22

      - name: Check formatting
        run: |
          find src -name '*.cpp' -o -name '*.hpp' \
            | xargs clang-format-22 --dry-run --Werror
